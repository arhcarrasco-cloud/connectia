const GAL_EXTERIOR_UPLIFT = 1.25;    // Pantallas exteriores: +25% sobre la tarifa base

function buildSuburbiaStoreRevenue(yr, occ, customPrices, customCuboPrice) {
  let priceMult = 1;
  for (let y = 1; y <= yr; y++) priceMult *= (1 + PRICE_INC[y]);
  return SUBURBIA_STORES.map(store => {
    const slotPrice = customPrices[store.tier];
    const slots = SUBURBIA_SLOTS_PER_CIRCUIT[store.tier] || 8;
    const hasCubo = SUBURBIA_CUBO_CECOS.has(store.ceco);
    // Pantallas 85": cada pantalla es independiente, se vende en circuito.
    // 1 slot = aparecer en TODAS las pantallas de la tienda. Precio del slot = tarifa × núm. pantallas.
    const screenCount = store.tier === 'Pantallas 85"' ? (store.monitors || 1) : 1;
    const circuitSlotPrice = slotPrice * screenCount;             // Precio real por slot de circuito
    const tierMonthly = circuitSlotPrice * slots;                 // Capacidad total mensual (circuitSlotPrice × 8 slots)
    const cuboMonthly = hasCubo ? customCuboPrice * SUBURBIA_CUBO_SLOTS : 0;
    const monthlyPotential = tierMonthly + cuboMonthly;
    const annualPotential = monthlyPotential * 12;
    const monthlyProjected = monthlyPotential * occ * priceMult;
    const annualProjected = monthlyProjected * 12;
    return { ...store, slotPrice, slots, hasCubo, screenCount, circuitSlotPrice, tierMonthly, cuboMonthly, monthlyPotential, annualPotential, monthlyProjected, annualProjected, priceMult };
  });
}

function buildGaleriasStoreRevenue(yr, occ, galTierMults) {
  let priceMult = 1;
  for (let y = 1; y <= yr; y++) priceMult *= (1 + PRICE_INC[y]);
  return GALERIAS_STORES.map(store => {
    const tierMult = GAL_TIER_MULT[store.tier];
    const customTierMult = galTierMults[store.tier] || 1;
    const screenDetails = [];
    let extCount = 0;
    SIZE_ORDER.forEach(size => {
      const counts = store.sizes[size] || {int:0, ext:0};
      ["int","ext"].forEach(loc => {
        const qty = counts[loc] || 0;
        if (qty === 0) return;
        if (loc === "ext") extCount += qty;
        const uplift = loc === "ext" ? GAL_EXTERIOR_UPLIFT : 1;
        const slotPrice = GAL_BASE_TARIFFS[size] * tierMult * uplift * customTierMult;   // precio por slot
        const screenMonthly = slotPrice * GAL_SLOTS_PER_SCREEN;         // capacidad por pantalla (8 slots)
        const subtotal = screenMonthly * qty;                           // capacidad total de este bloque
        screenDetails.push({ size, location: loc, count: qty, slotPrice, screenMonthly, subtotal });
      });
    });
    const monthlyPotential = screenDetails.reduce((s, d) => s + d.subtotal, 0);
    const annualPotential = monthlyPotential * 12;
    const monthlyProjected = monthlyPotential * occ * priceMult;
    const annualProjected = monthlyProjected * 12;
    return { ...store, screenDetails, tierMult, extCount, monthlyPotential, annualPotential, monthlyProjected, annualProjected, priceMult };
  });
}

function buildMonthlyData(occ, customPrices, customCuboPrice, sbbRevSharePct, galRevSharePct, galTierMults) {
  const data = [];
  for (let mi = 0; mi < 60; mi++) {
    const yr = Math.floor(mi / 12);
    const mo = mi % 12;
    const yrStart = [26,27,28,29,30][yr];
    const moYr = mo < 4 ? yrStart : yrStart + 1;
    const label = `${MONTH_NAMES[mo]} ${String(moYr).padStart(2,'0')}`;
    const s = SEASON[mo];
    let priceMult = 1;
    for (let y = 1; y <= yr; y++) priceMult *= (1 + PRICE_INC[y]);

    const suburbiaStores = buildSuburbiaStoreRevenue(yr, occ, customPrices, customCuboPrice);
    const suburbiaNetworkRev = suburbiaStores.reduce((sum, st) => sum + (st.monthlyProjected * s), 0);
    const suburbiaExisting = (SUBURBIA_EXISTING_ANNUAL / 12) * priceMult * s;
    let suburbiaByTier = { "Video Wall": 0, 'Pantallas 85"': 0, "Mural / Backlight": 0, "Cubo": 0 };
    suburbiaStores.forEach(st => {
      suburbiaByTier[st.tier] += st.tierMonthly * occ * priceMult * s;
      if (st.hasCubo) suburbiaByTier["Cubo"] += customCuboPrice * SUBURBIA_CUBO_SLOTS * occ * priceMult * s;
    });
    const suburbiaTotalGross = suburbiaExisting + suburbiaNetworkRev;
    const suburbiaPagoFijo = 0;  // sin componente fijo
    const suburbiaPagoVar = suburbiaTotalGross * sbbRevSharePct;

    const galeriasStores = buildGaleriasStoreRevenue(yr, occ, galTierMults);
    const galeriasNetworkRev = galeriasStores.reduce((sum, st) => sum + (st.monthlyProjected * s), 0);
    let galeriasByTier = { Premium: 0, "Tier 1": 0, "Tier 2": 0, "Tier 3": 0 };
    galeriasStores.forEach(st => { galeriasByTier[st.tier] += st.monthlyProjected * s; });
    const galeriasFixedToLiv = (GAL_FIXED_BASE/12) * (Math.pow(1.05, yr)) * s;
    const galeriasVarToLiv = galeriasNetworkRev * galRevSharePct;

    const indRevs = {};
    INDUSTRIES.forEach(ind => {
      const brands = ind.brandsY[yr];
      indRevs[ind.id] = brands * ind.avgInvMonth * priceMult * s;
    });

    data.push({
      month: mi, label, yr, mo,
      suburbiaExisting, suburbiaNetworkRev, suburbiaTotalGross, suburbiaPagoFijo, suburbiaPagoVar, suburbiaByTier,
      galeriasNetworkRev, galeriasFixedToLiv, galeriasVarToLiv, galeriasByTier,
      indRevs, totalGross: suburbiaTotalGross + galeriasNetworkRev
    });
  }
  return data;
}

function buildAnnualData(monthly) {
  const annual = [null, null, null, null, null];
  monthly.forEach(m => {
    if (!annual[m.yr]) {
      annual[m.yr] = { yr: m.yr, suburbiaTotalGross: 0, suburbiaPagoFijo: 0, suburbiaPagoVar: 0, galeriasNetworkRev: 0, galeriasFixedToLiv: 0, galeriasVarToLiv: 0, indRevs: {} };
      INDUSTRIES.forEach(ind => annual[m.yr].indRevs[ind.id] = 0);
    }
    annual[m.yr].suburbiaTotalGross += m.suburbiaTotalGross;
    annual[m.yr].suburbiaPagoFijo += m.suburbiaPagoFijo;
    annual[m.yr].suburbiaPagoVar += m.suburbiaPagoVar;
    annual[m.yr].galeriasNetworkRev += m.galeriasNetworkRev;
    annual[m.yr].galeriasFixedToLiv += m.galeriasFixedToLiv;
    annual[m.yr].galeriasVarToLiv += m.galeriasVarToLiv;
    INDUSTRIES.forEach(ind => annual[m.yr].indRevs[ind.id] += m.indRevs[ind.id]);
  });
  return annual.filter(Boolean);
}

      {sub && <div style={{ fontSize: "11px", color: "#888", marginTop: "4px" }}>{sub}</div>}
    </div>
  );
}
