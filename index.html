<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connectia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}

/* Video background */
.video-bg{
  position:fixed;top:50%;left:50%;
  min-width:100%;min-height:100%;
  width:auto;height:auto;
  transform:translate(-50%,-50%) scale(1.1);
  z-index:0;
  object-fit:cover;
}

/* Purple overlay on top of video */
.purple-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:1;
  background:
    radial-gradient(ellipse at center, rgba(80,20,140,0.55) 0%, rgba(30,5,60,0.75) 50%, rgba(0,0,0,0.9) 100%),
    linear-gradient(180deg, rgba(60,10,120,0.3) 0%, rgba(20,0,50,0.5) 100%);
  mix-blend-mode:normal;
}

/* Animated particles (subtle stars overlay) */
canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:2;
  pointer-events:none;
}

/* Content */
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:3;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
}
.logo-container{
  display:flex;flex-direction:column;align-items:center;
  animation:fadeInScale 3s ease-out 0.5s forwards;
  opacity:0;transform:scale(0.9);
}
@keyframes fadeInScale{
  0%{opacity:0;transform:scale(0.9);}
  100%{opacity:1;transform:scale(1);}
}
.logo-img{
  width:min(450px, 78vw);height:auto;
  filter:drop-shadow(0 0 60px rgba(140,80,220,0.35));
}
.subtitle{
  margin-top:40px;
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(0.75rem,1.6vw,1rem);
  font-weight:300;
  letter-spacing:0.25em;
  color:rgba(255,255,255,0.5);
  text-align:center;
  text-transform:uppercase;
  animation:fadeInSub 2.5s ease-out 2s forwards;
  opacity:0;
}
@keyframes fadeInSub{
  0%{opacity:0;transform:translateY(16px);}
  100%{opacity:1;transform:translateY(0);}
}

/* Vignette */
.vignette{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
}
</style>
</head>
<body>

<!-- Video background -->
<video class="video-bg" autoplay muted loop playsinline>
  <source src="space.mp4" type="video/mp4">
</video>

<!-- Purple color grade overlay -->
<div class="purple-overlay"></div>

<!-- Vignette effect -->
<div class="vignette"></div>

<!-- Floating particles canvas -->
<canvas id="particles"></canvas>

<!-- Content -->
<div class="overlay">
  <div class="logo-container">
    <img class="logo-img" src="logo.png" alt="Connectia">
    <p class="subtitle">estamos conectando los puntos, volvemos pronto</p>
  </div>
</div>

<script>
(function(){
  var c=document.getElementById('particles');
  var ctx=c.getContext('2d');
  var w,h,particles=[];

  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
  window.addEventListener('resize',resize);
  resize();

  /* Create subtle floating particles */
  for(var i=0;i<120;i++){
    particles.push({
      x:Math.random()*w,
      y:Math.random()*h,
      r:Math.random()*1.5+0.3,
      dx:(Math.random()-0.5)*0.3,
      dy:-(Math.random()*0.4+0.1),
      a:Math.random()*0.4+0.1,
      pulse:Math.random()*0.02+0.005,
      phase:Math.random()*Math.PI*2
    });
  }

  var t=0;
  function draw(){
    t++;
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      p.x+=p.dx;
      p.y+=p.dy;
      if(p.y<-10){p.y=h+10;p.x=Math.random()*w;}
      if(p.x<-10)p.x=w+10;
      if(p.x>w+10)p.x=-10;

      var alpha=p.a*(0.6+0.4*Math.sin(t*p.pulse+p.phase));

      /* Glow */
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*4,0,Math.PI*2);
      ctx.fillStyle='rgba(180,140,255,'+(alpha*0.08)+')';
      ctx.fill();

      /* Core */
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(220,200,255,'+alpha+')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
