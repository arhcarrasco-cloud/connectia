<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connectia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.logo-container{display:flex;flex-direction:column;align-items:center;animation:fadeInScale 2.5s ease-out forwards;opacity:0;transform:scale(0.85);}
@keyframes fadeInScale{
  0%{opacity:0;transform:scale(0.85);}
  100%{opacity:1;transform:scale(1);}
}
.logo-svg{width:min(480px, 80vw);height:auto;filter:drop-shadow(0 0 50px rgba(160,100,255,0.25));}
.subtitle{
  margin-top:36px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(0.8rem,1.8vw,1.05rem);
  font-weight:300;
  letter-spacing:0.22em;
  color:rgba(255,255,255,0.45);
  text-align:center;
  text-transform:uppercase;
  animation:fadeInSub 3s ease-out 1.2s forwards;
  opacity:0;
}
@keyframes fadeInSub{
  0%{opacity:0;transform:translateY(14px);}
  100%{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>
<canvas id="universe"></canvas>
<div class="overlay">
  <div class="logo-container">
    <svg class="logo-svg" viewBox="0 0 600 210" xmlns="http://www.w3.org/2000/svg">
      <!-- Three dots matching the logo exactly -->
      <circle cx="370" cy="52" r="10" fill="#fff"/>
      <circle cx="420" cy="30" r="7.5" fill="#fff"/>
      <circle cx="495" cy="10" r="6" fill="#fff"/>
      <!-- connectia text - heavy bold -->
      <text x="300" y="185" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif"
        font-size="118" font-weight="900" fill="#fff" letter-spacing="-4">connectia</text>
    </svg>
    <p class="subtitle">estamos conectando los puntos, volvemos pronto</p>
  </div>
</div>
<script>
(function(){
  var canvas=document.getElementById('universe');
  var ctx=canvas.getContext('2d');
  var w,h,stars=[],nebulae=[];
  var mouseX=0.5,mouseY=0.5;
  var warpSpeed=0.0003;
  var time=0;

  function resize(){
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
  }
  window.addEventListener('resize',resize);
  resize();

  /* --- Stars --- */
  var NUM_STARS=1200;
  for(var i=0;i<NUM_STARS;i++){
    stars.push({
      x:Math.random()*2-1,
      y:Math.random()*2-1,
      z:Math.random()*1.8+0.05,
      size:Math.random()*1.6+0.2,
      twinkle:Math.random()*0.02+0.004,
      phase:Math.random()*Math.PI*2,
      hue:240+Math.random()*60,
      sat:20+Math.random()*50
    });
  }

  /* --- Nebula clouds --- */
  for(var i=0;i<10;i++){
    nebulae.push({
      x:Math.random()*2-1,
      y:Math.random()*2-1,
      r:Math.random()*350+120,
      hue:255+Math.random()*30-15,
      a:Math.random()*0.025+0.008,
      dx:(Math.random()-0.5)*0.00008,
      dy:(Math.random()-0.5)*0.00008
    });
  }

  document.addEventListener('mousemove',function(e){
    mouseX=e.clientX/w;
    mouseY=e.clientY/h;
  });

  /* --- Draw nebula --- */
  function drawNebula(){
    for(var i=0;i<nebulae.length;i++){
      var n=nebulae[i];
      n.x+=n.dx; n.y+=n.dy;
      if(Math.abs(n.x)>1.6){n.x*=-1;}
      if(Math.abs(n.y)>1.6){n.y*=-1;}
      var sx=w/2+n.x*w/2+(mouseX-0.5)*-25;
      var sy=h/2+n.y*h/2+(mouseY-0.5)*-25;
      var g=ctx.createRadialGradient(sx,sy,0,sx,sy,n.r);
      g.addColorStop(0,'hsla('+n.hue+',65%,35%,'+(n.a*1.8)+')');
      g.addColorStop(0.5,'hsla('+n.hue+',55%,25%,'+(n.a)+')');
      g.addColorStop(1,'hsla('+n.hue+',40%,15%,0)');
      ctx.fillStyle=g;
      ctx.fillRect(0,0,w,h);
    }
  }

  /* --- Draw stars with warp/travel effect --- */
  function drawStars(){
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      s.z-=warpSpeed*s.z*2.5;
      if(s.z<=0.008){
        s.z=1.8;
        s.x=Math.random()*2-1;
        s.y=Math.random()*2-1;
      }
      var px=(mouseX-0.5)*-0.04/s.z;
      var py=(mouseY-0.5)*-0.04/s.z;
      var sx=w/2+(s.x+px)/s.z*w*0.35;
      var sy=h/2+(s.y+py)/s.z*h*0.35;
      if(sx<-20||sx>w+20||sy<-20||sy>h+20)continue;

      var tw=0.5+0.5*Math.sin(time*s.twinkle*60+s.phase);
      var br=tw*(1/s.z)*0.55;
      if(br>1)br=1;
      var sz=s.size*(1/s.z)*0.7;
      if(sz>4.5)sz=4.5;
      if(sz<0.2)sz=0.2;

      /* Warp trail */
      if(warpSpeed>0.001&&sz>0.8){
        var trailLen=sz*warpSpeed*800;
        if(trailLen>0.5){
          var dx=sx-w/2, dy=sy-h/2;
          var dist=Math.sqrt(dx*dx+dy*dy)||1;
          var nx=dx/dist, ny=dy/dist;
          var g=ctx.createLinearGradient(sx,sy,sx-nx*trailLen,sy-ny*trailLen);
          g.addColorStop(0,'hsla('+s.hue+','+s.sat+'%,80%,'+(br*0.5)+')');
          g.addColorStop(1,'hsla('+s.hue+','+s.sat+'%,80%,0)');
          ctx.strokeStyle=g;
          ctx.lineWidth=sz*0.6;
          ctx.beginPath();
          ctx.moveTo(sx,sy);
          ctx.lineTo(sx-nx*trailLen,sy-ny*trailLen);
          ctx.stroke();
        }
      }

      /* Glow */
      if(sz>1.2){
        ctx.beginPath();
        ctx.arc(sx,sy,sz*2.5,0,Math.PI*2);
        ctx.fillStyle='hsla('+s.hue+','+s.sat+'%,65%,'+(br*0.06)+')';
        ctx.fill();
      }

      /* Core */
      ctx.beginPath();
      ctx.arc(sx,sy,sz,0,Math.PI*2);
      ctx.fillStyle='hsla('+s.hue+','+s.sat+'%,88%,'+br+')';
      ctx.fill();
    }
  }

  /* --- Shooting stars --- */
  var shooters=[];
  function shootingStar(){
    if(Math.random()<0.004&&shooters.length<3){
      shooters.push({
        x:Math.random()*w*0.8,
        y:Math.random()*h*0.4,
        vx:Math.random()*10+5,
        vy:Math.random()*4+1,
        life:1,
        decay:Math.random()*0.012+0.008,
        len:Math.random()*60+30
      });
    }
    for(var i=shooters.length-1;i>=0;i--){
      var s=shooters[i];
      s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
      if(s.life<=0){shooters.splice(i,1);continue;}
      var g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*5,s.y-s.vy*5);
      g.addColorStop(0,'rgba(210,180,255,'+s.life+')');
      g.addColorStop(1,'rgba(210,180,255,0)');
      ctx.strokeStyle=g;
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(s.x,s.y);
      ctx.lineTo(s.x-s.vx*5,s.y-s.vy*5);
      ctx.stroke();
    }
  }

  /* --- Central purple glow --- */
  function centralGlow(){
    var cx=w/2,cy=h/2;
    var pulse=0.7+0.3*Math.sin(time*0.008);
    var r=Math.min(w,h)*0.35*pulse;
    var g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,'hsla(270,60%,40%,0.04)');
    g.addColorStop(0.5,'hsla(265,50%,30%,0.02)');
    g.addColorStop(1,'hsla(260,40%,20%,0)');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,w,h);
  }

  /* --- Animation loop --- */
  function frame(){
    time++;

    /* Fade previous frame (creates trails) */
    ctx.fillStyle='rgba(2,0,8,0.12)';
    ctx.fillRect(0,0,w,h);

    centralGlow();
    drawNebula();
    drawStars();
    shootingStar();

    /* Accelerate into the universe over 5 seconds */
    if(time<350){
      warpSpeed=0.0003+time*0.0000045;
    }else{
      warpSpeed=0.0019;
    }

    requestAnimationFrame(frame);
  }

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,w,h);
  frame();
})();
</script>
</body>
</html>
